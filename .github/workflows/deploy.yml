name: Deploy to Kubernetes

# Deploys the application workloads (handler, cloudtasks, scheduler) to a target
# environment by applying k8s/overlays/<env>/app.
#
# Triggers:
#   - workflow_run: a successful main build auto-deploys to STAGING.
#   - workflow_dispatch: pick the environment (default staging) and run from any
#     branch. Optionally pin an explicit image tag; otherwise the tag is
#     computed as <branch>-<sha7>, matching the docker-push naming.
#
# Production promotion is always manual: run workflow_dispatch with
# environment=production and the image tag that passed staging verification.
#
# Scaffolding (namespace, ConfigMap, Secret, Services) is owned by the
# "Infrastructure" workflow and must already exist for the target environment.
on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options:
          - staging
          - production
        default: staging
        required: true
      image_tag:
        description: >-
          Existing image tag in GHCR to deploy (e.g. latest, or a pinned
          main-<sha7>). Defaults to latest = the current main image. Staging
          reuses prod images, so you do NOT need to build a staging-specific
          image.
        required: false
        default: latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_CLIENT_SECRET }}
          tags: tag:ci

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Wait for cluster connectivity
        run: |
          for i in {1..10}; do
            if kubectl cluster-info --request-timeout=5s >/dev/null 2>&1; then
              echo "Cluster is reachable"
              exit 0
            fi
            echo "Waiting for cluster... ($i/10)"
            sleep 5
          done
          echo "ERROR: Could not reach cluster after 50s"
          exit 1

      - name: Resolve environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            ENVIRONMENT=staging
          else
            ENVIRONMENT="${{ inputs.environment }}"
          fi
          case "$ENVIRONMENT" in
            staging)    NAMESPACE=firepower-staging ;;
            production) NAMESPACE=firepower ;;
            *) echo "ERROR: unknown environment '$ENVIRONMENT'"; exit 1 ;;
          esac
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          # Offseason routing: Jun 22 – Sep 30 (any year) in UTC.
          # Force base-10 parsing to avoid octal interpretation of 06xx dates.
          OVERLAY="$ENVIRONMENT"
          if [ "$ENVIRONMENT" = "staging" ]; then
            MMDD=$(date -u +%m%d)
            if [ $((10#$MMDD)) -ge 622 ] && [ $((10#$MMDD)) -le 930 ]; then
              OVERLAY="staging-offseason"
              echo "Offseason window active (${MMDD} UTC) -> routing staging to game data emulator"
            fi
          fi
          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "namespace=$NAMESPACE"     >> "$GITHUB_OUTPUT"
          echo "owner=$OWNER"             >> "$GITHUB_OUTPUT"
          echo "overlay=$OVERLAY"         >> "$GITHUB_OUTPUT"
          echo "Deploying to $ENVIRONMENT (namespace $NAMESPACE, overlay $OVERLAY)"

      - name: Compute image tag
        id: image-tag
        run: |
          # Auto deploys from a main build pin the exact image just built.
          # Manual runs deploy an existing GHCR tag (default: latest), so no
          # staging-specific images need to be created.
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            BRANCH=$(echo "${{ github.event.workflow_run.head_branch }}" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
            SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
            echo "tag=${BRANCH}-${SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify images are available in registry
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
          OWNER: ${{ steps.env.outputs.owner }}
        run: |
          HANDLER_IMAGE="ghcr.io/${OWNER}/handler:${IMAGE_TAG}"
          SCHEDULER_IMAGE="ghcr.io/${OWNER}/scheduler:${IMAGE_TAG}"
          TIMEOUT=300
          INTERVAL=10
          ELAPSED=0

          wait_for_image() {
            local image="$1"
            local elapsed=0
            echo "Waiting for image: ${image}"
            while true; do
              if docker manifest inspect "${image}" >/dev/null 2>&1; then
                echo "Image available: ${image}"
                return 0
              fi
              if [ "${elapsed}" -ge "${TIMEOUT}" ]; then
                echo "ERROR: Timed out after ${TIMEOUT}s waiting for ${image}"
                return 1
              fi
              echo "Not available yet (${elapsed}s elapsed), retrying in ${INTERVAL}s..."
              sleep "${INTERVAL}"
              elapsed=$((elapsed + INTERVAL))
            done
          }

          wait_for_image "${HANDLER_IMAGE}"
          wait_for_image "${SCHEDULER_IMAGE}"
          echo "Both images verified in registry"

      - name: Render app overlay
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
        run: |
          kubectl kustomize "k8s/overlays/${{ steps.env.outputs.overlay }}/app" \
            | envsubst '${IMAGE_TAG}' > rendered-app.yaml
          echo "----- rendered workloads -----"
          cat rendered-app.yaml

      - name: Validate rendered manifests
        run: kubectl apply --dry-run=client -f rendered-app.yaml

      - name: Apply workloads
        run: kubectl apply -f rendered-app.yaml

      - name: Wait for handler rollout
        run: kubectl rollout status deployment/handler -n "${{ steps.env.outputs.namespace }}" --timeout=300s

      - name: Wait for cloudtasks rollout
        run: kubectl rollout status deployment/cloudtasks -n "${{ steps.env.outputs.namespace }}" --timeout=300s

      - name: Verify scheduler cronjob updated
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
          OWNER: ${{ steps.env.outputs.owner }}
        run: |
          EXPECTED="ghcr.io/${OWNER}/scheduler:${IMAGE_TAG}"
          ACTUAL=$(kubectl get cronjob scheduler -n "${{ steps.env.outputs.namespace }}" -o jsonpath='{.spec.jobTemplate.spec.template.spec.containers[0].image}')
          echo "Expected image: ${EXPECTED}"
          echo "Actual image:   ${ACTUAL}"
          if [ "${ACTUAL}" != "${EXPECTED}" ]; then
            echo "ERROR: Scheduler CronJob image does not match expected"
            exit 1
          fi
          echo "Scheduler CronJob updated successfully"
