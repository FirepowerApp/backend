name: Infrastructure

# Stands up the relatively static scaffolding (namespace, ConfigMap, Services,
# Secret) for a target environment. Manual only: pick the environment and run
# it from any branch via the Actions tab. Workloads are deployed separately by
# the "Deploy to Kubernetes" workflow.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options:
          - staging
          - production
        default: staging
        required: true

jobs:
  setup-infrastructure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_CLIENT_SECRET }}
          tags: tag:ci

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Wait for cluster connectivity
        run: |
          for i in {1..10}; do
            if kubectl cluster-info --request-timeout=5s >/dev/null 2>&1; then
              echo "Cluster is reachable"
              exit 0
            fi
            echo "Waiting for cluster... ($i/10)"
            sleep 5
          done
          echo "ERROR: Could not reach cluster after 50s"
          exit 1

      - name: Resolve namespace
        id: env
        run: |
          case "${{ inputs.environment }}" in
            staging)    echo "namespace=firepower-staging" >> "$GITHUB_OUTPUT" ;;
            production) echo "namespace=firepower"         >> "$GITHUB_OUTPUT" ;;
            *) echo "ERROR: unknown environment '${{ inputs.environment }}'"; exit 1 ;;
          esac

      - name: Validate infrastructure overlay
        run: kubectl apply -k "k8s/overlays/${{ inputs.environment }}/infra" --dry-run=client

      - name: Apply infrastructure overlay
        run: kubectl apply -k "k8s/overlays/${{ inputs.environment }}/infra"

      - name: Create app-secrets
        run: |
          kubectl create secret generic app-secrets \
            --namespace="${{ steps.env.outputs.namespace }}" \
            --from-literal=DISCORD_BOT_TOKEN=${{ secrets.DISCORD_BOT_TOKEN }} \
            --from-literal=DISCORD_CHANNEL_ID=${{ secrets.DISCORD_CHANNEL_ID }} \
            --from-literal=APNS_TEAM_ID=${{ secrets.APNS_TEAM_ID }} \
            --from-literal=APNS_KEY_ID=${{ secrets.APNS_KEY_ID }} \
            --from-literal=APNS_AUTH_KEY=${{ secrets.APNS_AUTH_KEY }} \
            --from-literal=APNS_TOPIC=${{ secrets.APNS_TOPIC }} \
            --from-literal=APNS_HOST=${{ secrets.APNS_HOST }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # ghcr-pull-secret is not required: GHCR packages are public
      # because the source repository (FirepowerApp/backend) is public.
