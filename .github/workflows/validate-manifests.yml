name: Validate Kubernetes Manifests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sLo kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform.tar.gz kubeconform
          sudo install kubeconform /usr/local/bin/kubeconform

      - name: Render and validate overlays
        env:
          IMAGE_TAG: ci-validate
        run: |
          mkdir rendered
          for env in staging production; do
            for layer in infra app; do
              kubectl kustomize "k8s/overlays/${env}/${layer}" \
                | envsubst '${IMAGE_TAG}' > "rendered/${env}-${layer}.yaml"
            done
          done
          kubeconform -strict -summary -output pretty rendered/
