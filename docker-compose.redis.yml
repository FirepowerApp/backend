# Docker Compose for Redis Queue Mode
# Starts Redis, Asynqmon (web dashboard), and the backend in worker mode.
#
# Usage:
#   podman-compose -f docker-compose.redis.yml up
#   podman-compose -f docker-compose.redis.yml --profile test up         # include mock APIs
#   podman-compose -f docker-compose.redis.yml --profile scheduler up    # include scheduler (live)
#   podman-compose -f docker-compose.redis.yml --profile scheduler-test up  # scheduler + mock APIs
#
# Dashboard: http://localhost:8980

x-common-settings: &common-settings
  networks:
    - net
  restart: unless-stopped

x-healthcheck-defaults: &healthcheck-defaults
  interval: 5s
  timeout: 3s
  retries: 30
  start_period: 10s

services:
  redis:
    <<: *common-settings
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "ping"]
    profiles:
      - home
      - test
      - default

  asynqmon:
    <<: *common-settings
    image: hibiken/asynqmon:latest
    platform: linux/amd64
    ports:
      - "8980:8080"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - home
      - test
      - default

  backend:
    <<: *common-settings
    build:
      context: ./watchgameupdates
      dockerfile: Dockerfile.worker
    image: watchgameupdates-worker:latest
    environment:
      - REDIS_ADDRESS=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - MESSAGE_INTERVAL_SECONDS=60
    env_file:
      - ./watchgameupdates/.env.redis
    depends_on:
      redis:
        condition: service_healthy
    # No healthcheck: the worker runs on distroless/static (no shell, no pgrep)
    # and exposes no HTTP port. Use the Asynqmon dashboard for liveness instead.
    profiles:
      - home
      - test
      - default

  scheduler:
    <<: *common-settings
    build:
      context: ./watchgameupdates
      dockerfile: Dockerfile.scheduler
    image: schedulegametrackers:latest
    environment:
      - SCHEDULER_QUEUE=redis
      - REDIS_ADDRESS=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
    env_file:
      - ./watchgameupdates/.env.redis
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: "no"
    profiles:
      - scheduler
      - scheduler-test

  # Mock Data API (test and scheduler-test profiles)
  mockdataapi:
    <<: *common-settings
    image: blnelson/firepowermockdataserver:latest
    ports:
      - "8124:8124"
      - "8125:8125"
    environment:
      - PLAYBYPLAY_PORT=8125
      - STATS_PORT=8124
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8125/v1/gamecenter/test/play-by-play || exit 1"]
    profiles:
      - test
      - scheduler-test

volumes:
  redis-data:

networks:
  net:
    driver: bridge
