apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Infrastructure base: out-of-band scaffolding owned by the infrastructure.yml
# workflow. Services only — the namespace comes from the overlays and the
# Secret is created imperatively. The ConfigMap lives in the app layer because
# it is a release artifact that is version-coupled to the code.
resources:
  - service-backend.yaml
  - service-cloudtasks.yaml
