apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: firepower-staging

resources:
  - ../../../base/app

patches:
  - target:
      kind: ConfigMap
      name: app-config
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: app-config
      data:
        APP_ENV: "staging"
        SCHEDULER_SHOULD_NOTIFY: "true"
